# PR Gate — runs the same `npm run pre-deploy` script we run locally before
# every push. Lint + type-check + custom safety checks (feature flags, schedule
# import threshold, migration sanity).
#
# Wired to be REQUIRED for PRs to merge into main via branch protection
# (see docs/WORKFLOW.md). Lovable's `gpt-engineer-app[bot]` is exempt from PR
# requirement — it pushes directly to main as before.
name: PR checks

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

# Cancel superseded runs when a PR receives new commits
concurrency:
  group: pr-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pre-deploy:
    name: pre-deploy
    runs-on: ubuntu-latest
    # Skip drafts to save Action minutes
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run pre-deploy gate
        run: npm run pre-deploy
